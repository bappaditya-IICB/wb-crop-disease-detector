name: krishak_ai
description: Crop Disease Detection for West Bengal Farmers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # TFLite inference
  tflite_flutter: ^0.10.4

  # Camera & gallery
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  permission_handler: ^11.3.0

  # Image processing
  image: ^4.1.7

  # UI & UX
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  # Utilities
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/model/
    - assets/lottie/

  fonts:
    - family: Hind
      fonts:
        - asset: assets/fonts/Hind-Regular.ttf
        - asset: assets/fonts/Hind-Medium.ttf
          weight: 500
        - asset: assets/fonts/Hind-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Hind-Bold.ttf
          weight: 700
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700
