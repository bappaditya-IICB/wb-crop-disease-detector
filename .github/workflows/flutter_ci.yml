name: Flutter CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - '.github/workflows/flutter_ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'

jobs:
  # ── Lint & Analyse ─────────────────────────────────────────────────────────
  lint:
    name: Dart Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run static analysis
        run: flutter analyze --no-fatal-infos

  # ── Build APK ──────────────────────────────────────────────────────────────
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Generate placeholder model so the build doesn't fail on missing .tflite
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate placeholder TFLite model
        working-directory: .
        run: |
          pip install tensorflow --quiet
          python training/generate_placeholder_model.py

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build APK (split by ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  # ── Python lint (training scripts) ────────────────────────────────────────
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint training scripts
        run: |
          flake8 training/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=training/data/
